<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>美丽烟台理工校园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            padding-bottom: 60px; /* 给固定页脚留出空间 */
        }
        h1 {
            text-align: center;
            padding: 20px 0;
            background-color: #f0f8ff;
            color: #2c3e50;
        }
        .container {
            width: 90%;
            margin: 0 auto;
        }
        /* 九宫格通用样式 */
        .grid-section {
            margin: 30px 0;
            position: relative;
        }
        .grid-title {
            font-size: 24px;
            color: #34495e;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 5px solid #3498db;
            transition: transform 0.5s ease;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .grid-item {
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .grid-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            transition: all 0.5s ease;
        }
        /* 第一个主题：九宫格 */
        #theme1 .grid-item img:hover {
            transform: scale(1.5);
        }
        #theme1 .grid-title:hover {
            transform: rotate(45deg);
        }
        /* 第二个主题：绝对定位实现 */
        #theme2 {
            position: relative;
            height: 650px; /* 为绝对定位容器设置高度 */
        }
        #theme2 .grid-container {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 200px);
        }
        #theme2 .grid-item img:hover {
            transform: skewX(30deg);
        }
        /* 第三个主题：普通九宫格 */
        #theme3 {
            margin-bottom: 40px;
        }
        /* 页脚：固定定位 */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>美丽烟台理工校园</h1>
    <div class="container">
        <!-- 主题一 -->
        <section id="theme1" class="grid-section">
            <h2 class="grid-title">主题一：校园风光</h2>
            <div class="grid-container">
                <div class="grid-item"><img src="https://picsum.photos/id/10/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/11/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/12/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/13/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/14/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/15/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/16/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/17/400/300" alt="校园风景"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/18/400/300" alt="校园风景"></div>
            </div>
        </section>

        <!-- 主题二（绝对定位） -->
        <section id="theme2" class="grid-section">
            <h2 class="grid-title">主题二：校园建筑（绝对定位实现）</h2>
            <div class="grid-container">
                <div class="grid-item"><img src="https://picsum.photos/id/20/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/21/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/22/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/23/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/24/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/25/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/26/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/27/400/300" alt="校园建筑"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/28/400/300" alt="校园建筑"></div>
            </div>
        </section>

        <!-- 主题三 -->
        <section id="theme3" class="grid-section">
            <h2 class="grid-title">主题三：校园生活</h2>
            <div class="grid-container">
                <div class="grid-item"><img src="https://picsum.photos/id/30/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/31/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/32/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/33/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/34/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/35/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/36/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/37/400/300" alt="校园生活"></div>
                <div class="grid-item"><img src="https://picsum.photos/id/38/400/300" alt="校园生活"></div>
            </div>
        </section>
    </div>

    <!-- 页脚（固定定位） -->
    <footer>
        © 2026 美丽烟台理工校园 | 学号：XXX | 姓名：XXX
    </footer>
</body>
</html>
